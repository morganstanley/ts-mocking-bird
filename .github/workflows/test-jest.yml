name: Compatible Jest Versions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        jest-version: [26.x, 27.x, 28.x, 29.x, 30.x]
        include:
          - jest-version: 26.x
            ts-jest-version: 26.x
          - jest-version: 27.x
            ts-jest-version: 27.x
          - jest-version: 28.x
            ts-jest-version: 28.x
          - jest-version: 29.x
            ts-jest-version: 29.x
          - jest-version: 30.x
            ts-jest-version: 29.x

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Use Node.js 22.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22.x
    - run: npm ci
    - run: npm install jest@${{ matrix.jest-version }} ts-jest@${{ matrix.ts-jest-version }} @types/jest@${{ matrix.jest-version }} --legacy-peer-deps
    - run: npm run test:jest
